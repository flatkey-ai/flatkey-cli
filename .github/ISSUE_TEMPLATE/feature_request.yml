name: Feature request
description: Request a Flatkey CLI feature.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should be easier?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What command or behavior do you want?
      render: bash
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - image
        - video
        - audio
        - text
        - models
        - credits/status
        - packaging
        - docs
        - other
